<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python 节点编程编辑器 - 专业版</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/monokai.min.css">
</head>
<body>
    <div class="app">
        <!-- 左侧：函数库 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>📦 函数库</h3>
                <button id="refresh-functions" title="刷新函数库">🔄</button>
            </div>
            <div id="function-tree" class="function-tree"></div>
        </div>

        <!-- 中央：节点画布 -->
        <div class="canvas-container">
            <div class="toolbar">
                <button id="clear-canvas">🗑️ 清空画布</button>
                <button id="run-all">▶ 运行所有节点</button>
                <button id="toggle-exec-order">📊 显示执行顺序</button>
                <span id="exec-status" class="status-ready">✅ 就绪</span>
            </div>
            <div id="react-flow" class="react-flow"></div>
        </div>

        <!-- 右侧：代码面板 -->
        <div class="code-panel">
            <div class="code-header">
                <h3>🐍 生成的 Python 代码</h3>
                <div class="code-actions">
                    <button id="copy-code" title="复制代码">📋 复制</button>
                    <button id="download-code" title="下载为 .py 文件">💾 下载 .py</button>
                </div>
            </div>
            <textarea id="code-editor"></textarea>
            <div class="output-preview">
                <div class="output-header">
                    <span>📋 执行日志</span>
                    <button id="clear-logs">清空</button>
                </div>
                <div id="output-log" class="output-log"></div>
            </div>
        </div>
    </div>

    <!-- 嵌套节点编辑模态框 -->
    <div id="nested-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📦 嵌套节点编辑器</h3>
                <span class="modal-close">&times;</span>
            </div>
            <div class="modal-body">
                <div class="nested-editor">
                    <div id="nested-canvas" class="nested-canvas"></div>
                </div>
                <div class="nested-info">
                    <div class="nested-inputs">
                        <strong>输入端口:</strong>
                        <div id="nested-input-list"></div>
                        <button id="add-nested-input">+ 添加输入</button>
                    </div>
                    <div class="nested-outputs">
                        <strong>输出端口:</strong>
                        <div id="nested-output-list"></div>
                        <button id="add-nested-output">+ 添加输出</button>
                    </div>
                    <button id="save-nested" class="save-btn">💾 保存嵌套节点</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/reactflow@11.10.4/dist/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
